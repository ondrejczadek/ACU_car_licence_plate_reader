<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPZ Detektor</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f0e8;
            color: #333;
            margin: 0;
            padding: 40px 20px;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            text-align: center;
        }

        h1 {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 25px;
            color: #222;
        }

        img {
            width: 100%;
            max-width: 1100px;
            border-radius: 6px;
            border: 1px solid #d5cfc5;
        }

        table {
            width: 100%;
            margin: 25px auto 0;
            border-collapse: collapse;
            background: #fff;
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid #d5cfc5;
            text-align: left;
        }

        th {
            background: #ece7dd;
            padding: 10px 20px;
            font-size: 11px;
            text-transform: uppercase;
            color: #777;
            letter-spacing: 1px;
            border-bottom: 1px solid #d5cfc5;
        }

        td {
            padding: 10px 20px;
            border-bottom: 1px solid #f0ece4;
            font-size: 14px;
        }

        tr:last-child td {
            border-bottom: none;
        }

        .col-num {
            width: 50px;
            color: #aaa;
            text-align: center;
        }

        .col-spz {
            font-family: monospace;
            font-weight: 700;
            font-size: 16px;
            letter-spacing: 2px;
        }

        .col-datum {
            color: #888;
        }

        .col-pocet {
            text-align: center;
            color: #888;
        }

        .col-akce {
            width: 40px;
            text-align: center;
        }

        .smazat {
            background: none;
            border: none;
            color: #ccc;
            cursor: pointer;
            font-size: 18px;
            padding: 0;
        }

        .smazat:hover {
            color: #e55;
        }

        .prazdno {
            padding: 30px;
            color: #bbb;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>SPZ Detektor</h1>
    <img id="videoFeed" src="/video_feed" alt="Video">
    <table>
        <thead>
            <tr>
                <th class="col-num">#</th>
                <th>SPZ</th>
                <th>Datum a cas</th>
                <th class="col-pocet">Detekci</th>
                <th class="col-akce"></th>
            </tr>
        </thead>
        <tbody id="history">
            <tr><td colspan="5" class="prazdno">Zadna data</td></tr>
        </tbody>
    </table>
</div>

<script>
    async function updateHistory() {
        try {
            const res = await fetch('/api/history');
            const data = await res.json();
            const el = document.getElementById('history');
            if (data.length === 0) {
                el.innerHTML = '<tr><td colspan="5" class="prazdno">Zadna data</td></tr>';
                return;
            }
            el.innerHTML = data.map((d, i) => {
                const t = new Date(d.timestamp);
                const datum = t.toLocaleDateString('cs-CZ') + '  ' + t.toLocaleTimeString('cs-CZ');
                return '<tr>' +
                    '<td class="col-num">' + (i + 1) + '</td>' +
                    '<td class="col-spz">' + d.text + '</td>' +
                    '<td class="col-datum">' + datum + '</td>' +
                    '<td class="col-pocet">' + d.count + 'x</td>' +
                    '<td class="col-akce"><button class="smazat" onclick="smazat(\'' + d.text + '\')">&times;</button></td>' +
                    '</tr>';
            }).join('');
        } catch(e) {}
    }

    async function smazat(text) {
        await fetch('/api/history/' + encodeURIComponent(text), {method: 'DELETE'});
        updateHistory();
    }

    document.getElementById('videoFeed').onerror = function() {
        setTimeout(() => { this.src = '/video_feed?' + Date.now(); }, 2000);
    };

    setInterval(updateHistory, 2000);
    updateHistory();
</script>

</body>
</html>
